          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("暂无数据", centerX, centerY);
          return;
        }

        const maxCount = words[0][1];
        const minCount = words[words.length - 1][1];

        const placed = [];
        const isDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const colors = isDark
          ? ["#e8a04a", "#6ee7b7", "#7ec8ff", "#f0c674", "#b4a9ff", "#67e8f9"]
          : ["#c87a2a", "#1a6b4a", "#1a5cad", "#96540a", "#5a4ab7", "#0891b2"];

        words.forEach(([word, count], i) => {
          const fontSize =
            14 + ((count - minCount) / (maxCount - minCount || 1)) * 38;
          ctx.font = `700 ${fontSize}px "Outfit", "Noto Sans SC", sans-serif`;

          const metrics = ctx.measureText(word);
          const textWidth = metrics.width;
          const textHeight = fontSize;

          let x = centerX;
          let y = centerY;
          let angle = i * 2.4;
          let radius = 10;
          let placedSuccess = false;

          for (let attempt = 0; attempt < 200; attempt++) {
            x = centerX + Math.cos(angle) * radius;
            y = centerY + Math.sin(angle) * radius * 0.6;

            if (
              x - textWidth / 2 < 10 ||
              x + textWidth / 2 > width - 10 ||
              y - textHeight / 2 < 10 ||
              y + textHeight / 2 > height - 10
            ) {
              angle += 0.5;
              radius += 5;
              continue;
            }

            let collision = false;
            for (const p of placed) {
              if (
                x + textWidth / 2 > p.x - p.w / 2 &&
                x - textWidth / 2 < p.x + p.w / 2 &&
                y + textHeight / 2 > p.y - p.h / 2 &&
                y - textHeight / 2 < p.y + p.h / 2
              ) {
                collision = true;
                break;
              }
            }

            if (!collision) {
              placedSuccess = true;
              break;
            }

            angle += 0.5;
            radius += 3;
          }

          if (placedSuccess) {
            placed.push({ x, y, w: textWidth + 4, h: textHeight + 4 });

            ctx.fillStyle = colors[i % colors.length];
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.shadowColor = isDark ? "rgba(0,0,0,0.4)" : "rgba(0,0,0,0.06)";
            ctx.shadowBlur = 3;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;

            ctx.fillText(word, x, y);

            ctx.shadowColor = "transparent";
          }
        });
      }

      function searchByWord(word) {
        const feedTab = document.querySelector('.tab[data-tab="all"]');
        switchTab("all", feedTab);
        document.getElementById("search-input").value = word;
        filterCards();
      }

      function setFilterAllActive() {
        document.querySelectorAll(".filter-chip").forEach((c) => {
          c.classList.toggle("active", c.dataset.filter === "all");
        });
      }

      function toggleFilter(f, el) {
        const chips = Array.from(document.querySelectorAll(".filter-chip"));
        if (f === "all") {
          activeFilters = new Set(["all"]);
          chips.forEach((c) =>
            c.classList.toggle("active", c.dataset.filter === "all"),
          );
        } else {
          activeFilters.delete("all");
          chips
            .find((c) => c.dataset.filter === "all")
            ?.classList.remove("active");
          if (activeFilters.has(f)) {
            activeFilters.delete(f);
            el.classList.remove("active");
          } else {
            activeFilters.add(f);
            el.classList.add("active");
          }
          if (activeFilters.size === 0) {
            activeFilters.add("all");
            setFilterAllActive();
          }
        }
        visibleCount = PAGE_SIZE;
        renderCards();
        saveUrlState();
      }

      // ── Event Listeners ──
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => switchTab(t.dataset.tab, t));
      });
      document.querySelectorAll(".filter-chip").forEach((c) => {
        c.addEventListener("click", () => toggleFilter(c.dataset.filter, c));
      });
      document
        .getElementById("search-input")
        .addEventListener("input", filterCards);
      document
        .getElementById("btn-refresh")
        .addEventListener("click", () => loadFeed(true));
      document
        .getElementById("btn-analyze")
        ?.addEventListener("click", loadAnalytics);
      document
        .getElementById("btn-load-more")
        ?.addEventListener("click", loadMore);

      // ── Word Cloud Resize ──
      let resizeDebounce;
      window.addEventListener("resize", () => {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(redrawWordCloud, 250);
      });

      // ── Init ──
      initTheme();
      initBackToTop();
      restoreUrlState();
      loadFeed(false);
    </script>
  </body>
</html>
